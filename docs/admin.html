<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GC Lax Admin</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --gc-green: #1A5C35;
            --gc-green-light: #236B40;
            --gc-bg: #F8F9FA;
            --gc-card: #FFFFFF;
            --gc-text: #111827;
            --gc-text-muted: #6B7280;
            --gc-border: rgba(0,0,0,0.08);
            --shadow-sm: 0 2px 12px rgba(0,0,0,0.06);
            --shadow-md: 0 8px 28px rgba(0,0,0,0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--gc-bg);
            color: var(--gc-text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .admin-header {
            background: linear-gradient(135deg, #0A0A0A 0%, #1a1a1a 100%);
            color: white;
            padding: 1.25rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .admin-header h1 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .admin-header a {
            color: rgba(255,255,255,0.65);
            font-size: 0.8rem;
            font-weight: 500;
            text-decoration: none;
            transition: color 0.15s;
        }

        .admin-header a:hover { color: white; }

        .admin-container {
            max-width: 640px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        .card {
            background: var(--gc-card);
            border-radius: 20px;
            border: 1px solid var(--gc-border);
            box-shadow: var(--shadow-sm);
            padding: 1.5rem;
            margin-bottom: 1rem;
        }

        .card-title {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 1rem;
            font-weight: 800;
            color: var(--gc-text);
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        label {
            display: block;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--gc-text-muted);
            margin-bottom: 0.35rem;
        }

        input[type="text"],
        input[type="url"],
        textarea {
            width: 100%;
            padding: 0.65rem 0.85rem;
            border: 1px solid var(--gc-border);
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.85rem;
            color: var(--gc-text);
            background: var(--gc-bg);
            margin-bottom: 1rem;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--gc-green);
            box-shadow: 0 0 0 3px rgba(26,92,53,0.1);
            background: white;
        }

        textarea { resize: vertical; min-height: 60px; }

        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .toggle-row label { margin-bottom: 0; }

        .toggle {
            position: relative;
            width: 44px;
            height: 24px;
            cursor: pointer;
        }

        .toggle input { opacity: 0; width: 0; height: 0; }

        .toggle-slider {
            position: absolute;
            inset: 0;
            background: #D1D5DB;
            border-radius: 24px;
            transition: 0.2s;
        }

        .toggle-slider::before {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            left: 3px;
            top: 3px;
            background: white;
            border-radius: 50%;
            transition: 0.2s;
            box-shadow: 0 1px 4px rgba(0,0,0,0.2);
        }

        .toggle input:checked + .toggle-slider {
            background: var(--gc-green);
        }

        .toggle input:checked + .toggle-slider::before {
            transform: translateX(20px);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.7rem 1.5rem;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, #1A5C35, #236B40);
            color: white;
            box-shadow: 0 2px 8px rgba(26,92,53,0.25);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(26,92,53,0.35);
        }

        .btn-secondary {
            background: transparent;
            color: var(--gc-green);
            border: 2px solid var(--gc-green);
        }

        .btn-secondary:hover {
            background: rgba(26,92,53,0.07);
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: linear-gradient(135deg, #1A5C35, #236B40);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 600;
            box-shadow: 0 4px 20px rgba(26,92,53,0.3);
            transition: transform 0.3s ease;
            z-index: 100;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .help-text {
            font-size: 0.75rem;
            color: var(--gc-text-muted);
            margin-top: -0.75rem;
            margin-bottom: 1rem;
            font-style: italic;
        }

        .link-field {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 0.5rem;
            align-items: start;
        }

        .link-field input { margin-bottom: 0; }

        .link-test {
            padding: 0.6rem 0.85rem;
            background: transparent;
            border: 1.5px solid var(--gc-green);
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--gc-green);
            cursor: pointer;
            text-decoration: none;
            white-space: nowrap;
            transition: all 0.15s;
        }

        .link-test:hover {
            background: rgba(26,92,53,0.07);
        }

        .divider {
            border: none;
            border-top: 1px solid var(--gc-border);
            margin: 1rem 0;
        }
    </style>
</head>
<body>

    <header class="admin-header">
        <h1>GC Lax Admin</h1>
        <a href="index.html">← View Site</a>
    </header>

    <div class="admin-container">

        <!-- ANNOUNCEMENT BANNER -->
        <div class="card">
            <div class="card-title">📢 Announcement Banner</div>
            <div class="toggle-row">
                <label for="admin-announce-active">Show announcement at top of page</label>
                <label class="toggle">
                    <input type="checkbox" id="admin-announce-active">
                    <span class="toggle-slider"></span>
                </label>
            </div>
            <label for="admin-announce-emoji">Emoji (optional)</label>
            <input type="text" id="admin-announce-emoji" placeholder="📸" style="max-width: 90px;">
            <label for="admin-announce-text">Announcement text</label>
            <textarea id="admin-announce-text" rows="2" placeholder="Team photos — Monday, March 2nd at 5:00 PM after practice!"></textarea>
        </div>

        <!-- LINKS -->
        <div class="card">
            <div class="card-title">🔗 Links</div>

            <label for="admin-link-store">Team Store URL</label>
            <div class="link-field">
                <input type="url" id="admin-link-store">
                <a class="link-test" onclick="testLink('admin-link-store')">Test ↗</a>
            </div>

            <hr class="divider">

            <label for="admin-link-groupspot-parents">GroupSpot — Parents URL</label>
            <div class="link-field">
                <input type="url" id="admin-link-groupspot-parents">
                <a class="link-test" onclick="testLink('admin-link-groupspot-parents')">Test ↗</a>
            </div>

            <label for="admin-link-groupspot-players">GroupSpot — Players URL</label>
            <div class="link-field">
                <input type="url" id="admin-link-groupspot-players">
                <a class="link-test" onclick="testLink('admin-link-groupspot-players')">Test ↗</a>
            </div>

            <label for="admin-parent-code">Parent Invite Code</label>
            <input type="text" id="admin-parent-code">

            <hr class="divider">

            <label for="admin-link-signups">Sign-Up Sheet URL</label>
            <div class="link-field">
                <input type="url" id="admin-link-signups">
                <a class="link-test" onclick="testLink('admin-link-signups')">Test ↗</a>
            </div>

            <hr class="divider">

            <label for="admin-link-livestats">Live Stats URL</label>
            <div class="link-field">
                <input type="url" id="admin-link-livestats">
                <a class="link-test" onclick="testLink('admin-link-livestats')">Test ↗</a>
            </div>

            <hr class="divider">

            <label for="admin-link-schedule-varsity">Schedule — Varsity URL</label>
            <div class="link-field">
                <input type="url" id="admin-link-schedule-varsity">
                <a class="link-test" onclick="testLink('admin-link-schedule-varsity')">Test ↗</a>
            </div>

            <label for="admin-link-schedule-jv">Schedule — JV URL</label>
            <div class="link-field">
                <input type="url" id="admin-link-schedule-jv">
                <a class="link-test" onclick="testLink('admin-link-schedule-jv')">Test ↗</a>
            </div>

            <label for="admin-link-schedule-frosh">Schedule — Frosh URL</label>
            <div class="link-field">
                <input type="url" id="admin-link-schedule-frosh">
                <a class="link-test" onclick="testLink('admin-link-schedule-frosh')">Test ↗</a>
            </div>
            <p class="help-text">Leave blank to show "Coming Soon"</p>
        </div>

        <!-- SIGN-UP REQUIREMENTS -->
        <div class="card">
            <div class="card-title">📋 Sign-Up Requirements</div>
            <label for="admin-signup-concessions">Concessions requirement</label>
            <input type="text" id="admin-signup-concessions">
            <label for="admin-signup-food">Food requirement</label>
            <input type="text" id="admin-signup-food">
        </div>

        <!-- PHOTO DAY -->
        <div class="card">
            <div class="card-title">📸 Photo Day</div>
            <p class="help-text" style="margin-top: -0.5rem; margin-bottom: 1rem;">Leave Date blank to hide this section from the site.</p>
            <label for="admin-photo-date">Date</label>
            <input type="text" id="admin-photo-date" placeholder="Monday, March 2nd">
            <label for="admin-photo-time">Time</label>
            <input type="text" id="admin-photo-time" placeholder="5:00 PM">
            <label for="admin-photo-note">Note</label>
            <textarea id="admin-photo-note" placeholder="After practice. Parent Night follows at 6:30 PM."></textarea>
        </div>

        <div style="margin-top: 1.5rem; padding-bottom: 2rem;">
            <button class="btn btn-primary" id="save-btn" onclick="saveToGitHub()" style="width:100%; justify-content:center; font-size:1rem; padding: 1rem;">
                Save Changes
            </button>
        </div>

    </div>

    <div id="toast" class="toast">Copied!</div>

    <script>
        function testLink(inputId) {
            var url = document.getElementById(inputId).value;
            if (url) window.open(url, '_blank');
        }

        function showToast(msg) {
            var toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(function() { toast.classList.remove('show'); }, 2500);
        }

        var siteData = {};

        // Load site-data.json and populate the form
        function loadFromJson() {
            fetch('site-data.json')
                .then(function(res) { return res.json(); })
                .then(function(data) {
                    siteData = data;

                    // Links
                    var links = data.links || {};
                    document.getElementById('admin-link-store').value = links.teamStore || '';
                    document.getElementById('admin-link-groupspot-parents').value = links.groupspotParents || '';
                    document.getElementById('admin-link-groupspot-players').value = links.groupspotPlayers || '';
                    document.getElementById('admin-link-signups').value = links.signupSheet || '';
                    document.getElementById('admin-link-livestats').value = links.liveStats || '';

                    // Parent code
                    document.getElementById('admin-parent-code').value = (data.groupspot && data.groupspot.parentCode) || '';

                    // Schedule links
                    var sched = data.scheduleLinks || {};
                    document.getElementById('admin-link-schedule-varsity').value = sched.varsity || '';
                    document.getElementById('admin-link-schedule-jv').value = sched.jv || '';
                    document.getElementById('admin-link-schedule-frosh').value = sched.frosh || '';

                    // Sign-up requirements
                    var signups = data.signups || {};
                    document.getElementById('admin-signup-concessions').value = signups.concessions || '';
                    document.getElementById('admin-signup-food').value = signups.food || '';

                    // Announcement
                    var announce = data.announcement || {};
                    document.getElementById('admin-announce-active').checked = !!announce.active;
                    document.getElementById('admin-announce-emoji').value = announce.emoji || '';
                    document.getElementById('admin-announce-text').value = announce.text || '';

                    // Photo day
                    var photo = data.photoDay || {};
                    document.getElementById('admin-photo-date').value = photo.date || '';
                    document.getElementById('admin-photo-time').value = photo.time || '';
                    document.getElementById('admin-photo-note').value = photo.note || '';
                })
                .catch(function() {
                    showToast('Error loading site-data.json');
                });
        }

        // Build updated data object from form fields
        function collectFormData() {
            var data = JSON.parse(JSON.stringify(siteData));
            data.links = data.links || {};
            data.links.teamStore = document.getElementById('admin-link-store').value;
            data.links.groupspotParents = document.getElementById('admin-link-groupspot-parents').value;
            data.links.groupspotPlayers = document.getElementById('admin-link-groupspot-players').value;
            data.links.signupSheet = document.getElementById('admin-link-signups').value;
            data.links.liveStats = document.getElementById('admin-link-livestats').value;
            data.groupspot = data.groupspot || {};
            data.groupspot.parentCode = document.getElementById('admin-parent-code').value;
            data.scheduleLinks = data.scheduleLinks || {};
            data.scheduleLinks.varsity = document.getElementById('admin-link-schedule-varsity').value;
            data.scheduleLinks.jv = document.getElementById('admin-link-schedule-jv').value;
            data.scheduleLinks.frosh = document.getElementById('admin-link-schedule-frosh').value;
            data.signups = data.signups || {};
            data.signups.concessions = document.getElementById('admin-signup-concessions').value;
            data.signups.food = document.getElementById('admin-signup-food').value;

            data.announcement = {
                active: document.getElementById('admin-announce-active').checked,
                emoji: document.getElementById('admin-announce-emoji').value,
                text: document.getElementById('admin-announce-text').value
            };

            data.photoDay = {
                date: document.getElementById('admin-photo-date').value,
                time: document.getElementById('admin-photo-time').value,
                note: document.getElementById('admin-photo-note').value
            };

            return data;
        }

        // Save to GitHub via Netlify function
        async function saveToGitHub() {
            var btn = document.getElementById('save-btn');
            btn.textContent = 'Saving…';
            btn.disabled = true;

            var token = sessionStorage.getItem('gclax-admin-pw');
            if (!token) {
                showToast('Session expired — please reload and log in again.');
                btn.textContent = 'Save Changes';
                btn.disabled = false;
                return;
            }

            var apiUrl = 'https://api.github.com/repos/brliechty-cloud/GCLAX/contents/docs/site-data.json';
            var headers = {
                'Authorization': 'Bearer ' + token,
                'Accept': 'application/vnd.github.v3+json',
                'Content-Type': 'application/json'
            };

            try {
                var getRes = await fetch(apiUrl, { headers: headers });
                if (!getRes.ok) throw new Error('Could not read file from GitHub');
                var sha = (await getRes.json()).sha;

                var json = JSON.stringify(collectFormData(), null, 2);
                var content = btoa(unescape(encodeURIComponent(json)));

                var putRes = await fetch(apiUrl, {
                    method: 'PUT',
                    headers: headers,
                    body: JSON.stringify({ message: 'Update site content via admin', content: content, sha: sha })
                });

                if (putRes.ok) {
                    showToast('✓ Saved! Site will update in ~30 seconds.');
                } else {
                    var err = await putRes.json();
                    showToast('Error: ' + (err.message || 'Save failed'));
                }
            } catch (e) {
                showToast('Failed: ' + (e.message || 'Could not reach GitHub'));
                console.error('Save error:', e);
            }

            btn.textContent = 'Save Changes';
            btn.disabled = false;
        }

        // ===== ADMIN LOGIN =====
        // The "password" is your GitHub fine-grained personal access token.
        // It is stored only in sessionStorage for this tab — never in the code.

        function checkAuth() {
            if (sessionStorage.getItem('gclax-admin-pw')) {
                loadFromJson();
                return;
            }

            var token = prompt('Enter admin token:');
            if (!token) {
                window.location.href = 'index.html';
                return;
            }

            sessionStorage.setItem('gclax-admin-pw', token);
            loadFromJson();
        }

        // Init
        checkAuth();
    </script>

</body>
</html>
