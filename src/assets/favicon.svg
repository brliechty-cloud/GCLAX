<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#1a5632"/>
  <!-- Wolf head scaled to fit 32x32 with padding -->
  <g transform="translate(16,17.5) scale(0.145)">
    <!-- White outline layer -->
    <g fill="white" stroke="white" stroke-width="8" stroke-linejoin="round">
      <polygon points="-55,-45 -70,-95 -30,-55"/>
      <polygon points="55,-45 70,-95 30,-55"/>
      <ellipse cx="0" cy="-25" rx="52" ry="45"/>
      <path d="M-45,-50 C-40,-75 -20,-90 0,-90 C20,-90 40,-75 45,-50 L55,-45 L70,-95 L30,-55 L0,-65 L-30,-55 L-70,-95 L-55,-45 Z"/>
      <path d="M-50,-10 C-52,10 -45,30 -25,50 L0,65 L25,50 C45,30 52,10 50,-10 Z"/>
    </g>
    <!-- Green wolf head -->
    <g fill="#0e3a20">
      <polygon points="-55,-45 -70,-95 -30,-55"/>
      <polygon points="55,-45 70,-95 30,-55"/>
      <ellipse cx="0" cy="-25" rx="52" ry="45"/>
      <path d="M-45,-50 C-40,-75 -20,-90 0,-90 C20,-90 40,-75 45,-50 L55,-45 L70,-95 L30,-55 L0,-65 L-30,-55 L-70,-95 L-55,-45 Z"/>
      <path d="M-50,-10 C-52,10 -45,30 -25,50 L0,65 L25,50 C45,30 52,10 50,-10 Z"/>
      <ellipse cx="0" cy="15" rx="22" ry="18"/>
      <polygon points="-20,45 0,68 20,45"/>
    </g>
    <!-- Eyes -->
    <ellipse cx="-18" cy="-20" rx="10" ry="7" fill="white"/>
    <ellipse cx="18" cy="-20" rx="10" ry="7" fill="white"/>
    <ellipse cx="-16" cy="-21" rx="5" ry="4" fill="#c8a951"/>
    <ellipse cx="20" cy="-21" rx="5" ry="4" fill="#c8a951"/>
    <!-- Nose -->
    <ellipse cx="0" cy="12" rx="8" ry="5.5" fill="white" opacity="0.8"/>
  </g>
</svg>